<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="text.e9603043e310">Ошибка - ЦАО Евразия</title>
  <link rel="stylesheet" href="../../css/normalize.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css?v=7">
  <link rel="stylesheet" href="../../css/layout.css?v=6">
  <link rel="stylesheet" href="../../css/components.css?v=3">
  <link rel="stylesheet" href="../../css/responsive.css?v=4">
  <link rel="stylesheet" href="error.css">
  <script src="../../js/translate.js?v=1" defer></script>
  <script src="../../js/pages/auth.js?v=22" defer></script>
</head>
<body class="theme-light">
  <header class="site-header">
    <div class="container header-container">
      <a class="logo" href="../../index.html" aria-label="Евразия - на главную" data-i18n-aria-label="text.c4ad87c3bcd9">
        <img class="logo__mark" src="../../assets/images/common/logo-mark.png" alt="">
        <img class="logo__text" src="../../assets/images/common/logo-text.png" alt="Евразия" data-i18n-alt="text.a69ffe88eb7c">
      </a>

      <nav class="main-nav" aria-label="Основная навигация" data-i18n-aria-label="text.97d8a7543067">
        <a href="../trails/trails.html" data-i18n="text.66ea8eb264be">Трассы</a>
        <a href="../hotels/hotels.html" data-i18n="text.d0efd3ad5604">Проживание</a>
        <a href="../tariffs/tariffs.html" data-i18n="text.f42c68482b0c">Услуги и тарифы</a>
        <a href="../cart/cart.html" data-i18n="text.d9e801f1ec38">Корзина</a>
        <a href="../account/account.html" data-auth-link data-i18n="text.07205a06c301">Вход</a>
      </nav>

      <div class="header-side">
        <div class="header-phones" role="group" aria-label="Телефоны" data-i18n-aria-label="text.f6fc5eaeb4c4">
          <a class="header-phone" href="tel:+79227288288">+79227288288</a>
          <a class="header-phone" href="tel:+73513790979">+73513790979</a>
        </div>
        <div class="user-settings" role="group" aria-label="Настройки сайта" data-i18n-aria-label="text.e8df23a5be44">
          <button class="settings-button" type="button" data-lang-toggle>RU | EN</button>
          <button class="settings-button settings-button--icon" type="button" aria-label="Переключить тему" data-theme-toggle data-i18n-aria-label="text.e8902e85703e"></button>
          <button class="settings-button" type="button" aria-label="Версия для слабовидящих" data-accessibility-toggle data-i18n-aria-label="text.4a019f49673b">A+</button>
        </div>
      </div>
    </div>
  </header>

  <main class="error-page">
    <section class="container error-card" aria-labelledby="error-title">
      <p class="error-card__code">404 / 500</p>
      <h1 id="error-title" data-i18n="text.5d9847760101">Что-то пошло не так</h1>
      <p data-i18n="text.62e1f4dce150">Страница не найдена или данные временно недоступны. Проверьте JSON Server и попробуйте открыть страницу ещё раз.</p>
      <p class="error-card__details" data-error-details hidden></p>
      <div class="error-card__actions">
        <a class="button button--primary" href="../../index.html" data-i18n="text.ef1ad90b17cd">На главную</a>
        <button class="button button--primary" type="button" data-error-back data-i18n="text.f6dab074d7bb">Назад</button>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var details = document.querySelector("[data-error-details]");
      var back = document.querySelector("[data-error-back]");
      var message = sessionStorage.getItem("eurasiaLastError");

      if (details && message) {
        details.hidden = false;
        details.textContent = message;
      }

      if (back) {
        back.addEventListener("click", function () {
          if (history.length > 1) {
            history.back();
          } else {
            window.location.href = "../../index.html";
          }
        });
      }
    });
  </script>
</body>
</html>
